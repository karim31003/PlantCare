<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Gardener - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#a4a451",
                        "primary-dark": "#8a8a43",
                        "background-light": "#f7f7f6",
                        "background-dark": "#1c1c16",
                        "brand-gradient-start": "#6CA651",
                        "brand-gradient-end": "#BBCB2E",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for clean mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100 h-screen w-full flex flex-col overflow-hidden">
<!-- Main Container with Gradient Background requested by user -->
<div class="relative flex-1 w-full h-full flex flex-col items-center justify-center p-4 bg-gradient-to-br from-brand-gradient-start to-brand-gradient-end" style="background: linear-gradient(160deg, #6CA651 0%, #BBCB2E 100%);">
<!-- Decorative subtle pattern overlay -->
<div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 20px 20px;"></div>
<!-- Logo / Header Area -->
<div class="z-10 w-full max-w-sm mb-6 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 bg-white/20 backdrop-blur-md rounded-2xl mb-4 shadow-lg border border-white/30">
<span class="material-symbols-outlined text-white text-[32px]">potted_plant</span>
</div>
<h1 class="text-3xl font-bold text-white drop-shadow-sm">My Gardener</h1>
<p class="text-white/90 text-sm font-medium mt-1">AI-Powered Plant Care</p>
</div>
<!-- Login Card -->
<div class="z-10 w-full max-w-sm bg-white dark:bg-slate-800 rounded-2xl shadow-xl overflow-hidden">
<div class="p-6 sm:p-8 flex flex-col gap-5">
<!-- Welcome Text -->
<div class="text-center">
<h2 class="text-xl font-bold text-slate-900 dark:text-white">Welcome Back</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Please enter your details to sign in.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-4">
<!-- Email Input -->
<label class="block">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1.5 block">Email</span>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="form-input block w-full pl-10 pr-3 py-3 rounded-lg border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700/50 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-primary focus:ring-1 sm:text-sm" placeholder="Enter your email" type="email"/>
</div>
</label>
<!-- Password Input -->
<label class="block">
<div class="flex justify-between items-center mb-1.5">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-200">Password</span>
<a class="text-xs font-semibold text-primary hover:text-primary-dark transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="form-input block w-full pl-10 pr-10 py-3 rounded-lg border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700/50 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-primary focus:ring-1 sm:text-sm" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</div>
</div>
</label>
<!-- Login Button -->
<button class="mt-2 w-full flex items-center justify-center bg-primary hover:bg-primary-dark text-white font-bold py-3.5 px-4 rounded-lg shadow-md transition-all active:scale-[0.98]" type="button">
                        Log In
                    </button>
</form>
<!-- Divider -->
<div class="relative py-2">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-600"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-800 px-3 text-slate-400">Or continue with</span>
</div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 px-4 py-2.5 border border-slate-200 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 hover:bg-slate-50 dark:hover:bg-slate-600 transition-colors">
<img alt="Google" class="w-5 h-5" data-alt="Google G Logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDSOj_QztWIVfVxFTi_-JKhRSkZaKXMzYegmvlNc95pzEwBMg_td0GNWAGO7HCuQmo0og-iSzj9O_8c3zUTW_TL3qsMone3rOdjiZvn7xoPQCtRa1Kc9_wSPK6v3TdQ3D0Zco-3gVKVNMPl5h9ndx2hH3CkERljSoeX4OdL1f9AqUZ51NdMFJUp931Cby3IJPr6Qt9n1QNZc-HZtvI5y_SNkPryt0lq1eLeLBK3mdUgUMDDshl3UPJ7DcP-RBORKTKQioDFqDFov50"/>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-200">Google</span>
</button>
<button class="flex items-center justify-center gap-2 px-4 py-2.5 border border-slate-200 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 hover:bg-slate-50 dark:hover:bg-slate-600 transition-colors">
<img alt="Facebook" class="w-5 h-5" data-alt="Facebook f Logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBydoALB09M2GhTRkYaucSCK882aoI4jJIB-0lNWUrgiBES5jTXJNU03yYpw7aZ4QiIwMEi7_sIMqJvyhHOpwADBSdIymuV9Xk2Kbdqj69Q-LdTaWWJijiWEs_bidmeCcGwV2-CUnUjexmzSSe4UM65RnrZvTLt0YmrQH_upfyAK_xNlJPc6P2CX7LMBq-w0QWBt_6tY9L0Wx2fB9KFlWgYE18kz6OFS-kA3Ur2D8dYW3WSXcXNPOscpY_sLxdY2yhaalb2ta9AJXY"/>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-200">Facebook</span>
</button>
</div>
</div>
<!-- Footer Link -->
<div class="bg-slate-50 dark:bg-slate-900/50 py-4 text-center border-t border-slate-100 dark:border-slate-700">
<p class="text-sm text-slate-600 dark:text-slate-400">
                    Don't have an account? 
                    <a class="font-bold text-primary hover:text-primary-dark ml-1 transition-colors" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- Safe area for iOS Home Indicator -->
<div class="h-6 w-full"></div>
</div>
</body></html>
