<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Plant Scan Camera - My Gardener</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#a4a451",
                        "olive-dark": "#6B7445",
                        "background-light": "#f7f7f6",
                        "background-dark": "#1c1c16",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom styles for camera viewfinder simulation */
        .camera-overlay {
            background: rgba(0, 0, 0, 0.3);
        }
        .scan-frame-corner {
            border-color: white;
            border-width: 4px;
            width: 40px;
            height: 40px;
            position: absolute;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 h-screen w-full overflow-hidden flex flex-col relative">
<!-- Camera Viewfinder Background -->
<div class="absolute inset-0 w-full h-full bg-cover bg-center z-0" data-alt="Close up of a vibrant monstera leaf with natural lighting" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAEALJsJCF0uqkm2a8a-LsgggpcBoz7Me9xCMR_pV6OhjmyRLi-Z-aQg7B1XOWK4z_BRRBfmxYOjWoIW7Qkck8PaWuB-N_ikWUv4z4aPOni0J0E531cbMI_IoeCLvoc_ZDUR25OQayBIdb-pZSOGPToau5Bsh8qYerKRpOmixwEceLZrYRNDXw7vNsC_iQ9FjhsASixxDKoZ3mg8RnXy_j0o8hPAv9AqGk20pN8-NXTl3XMYCrT9kc1l74YEuje7BcrRc-OfMsrwmI');">
<!-- Overlay for better text visibility -->
<div class="absolute inset-0 bg-black/20"></div>
</div>
<!-- Top Control Bar (SafeArea) -->
<div class="relative z-10 pt-12 pb-4 px-6 flex items-center justify-between bg-gradient-to-b from-black/60 to-transparent">
<!-- Close Button -->
<button class="flex items-center justify-center size-10 rounded-full bg-black/20 backdrop-blur-md text-white hover:bg-black/40 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<!-- Title / Mode -->
<div class="flex flex-col items-center">
<h1 class="text-white text-lg font-bold tracking-wide drop-shadow-md">Scan Plant</h1>
<div class="flex items-center gap-1 mt-1">
<span class="size-1.5 rounded-full bg-primary animate-pulse"></span>
<span class="text-xs font-medium text-white/90 uppercase tracking-wider">AI Active</span>
</div>
</div>
<!-- Flash Toggle -->
<button class="flex items-center justify-center size-10 rounded-full bg-black/20 backdrop-blur-md text-white hover:bg-black/40 transition-colors">
<span class="material-symbols-outlined">flash_off</span>
</button>
</div>
<!-- Central Scanning Area -->
<div class="relative z-10 flex-1 flex flex-col items-center justify-center px-8">
<!-- Scan Frame -->
<div class="relative w-full aspect-[3/4] max-w-sm rounded-3xl border border-white/20 shadow-2xl overflow-hidden">
<!-- Corner Brackets -->
<div class="absolute top-4 left-4 border-t-4 border-l-4 border-white w-8 h-8 rounded-tl-lg"></div>
<div class="absolute top-4 right-4 border-t-4 border-r-4 border-white w-8 h-8 rounded-tr-lg"></div>
<div class="absolute bottom-4 left-4 border-b-4 border-l-4 border-white w-8 h-8 rounded-bl-lg"></div>
<div class="absolute bottom-4 right-4 border-b-4 border-r-4 border-white w-8 h-8 rounded-br-lg"></div>
<!-- Scanning Line Animation -->
<div class="absolute top-0 left-0 w-full h-1 bg-primary/80 shadow-[0_0_15px_rgba(164,164,81,0.8)] animate-[scan_3s_ease-in-out_infinite]"></div>
<!-- Focus point -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 size-16 border border-white/30 rounded-full flex items-center justify-center">
<div class="size-1 bg-white rounded-full"></div>
</div>
</div>
<!-- Instruction Text -->
<div class="mt-8 bg-black/40 backdrop-blur-md px-4 py-2 rounded-full border border-white/10">
<p class="text-white text-sm font-medium text-center drop-shadow-sm">
                Center the leaf in the frame for diagnosis
            </p>
</div>
</div>
<!-- Bottom Action Area -->
<div class="relative z-10 pb-10 pt-8 bg-gradient-to-t from-black/80 via-black/40 to-transparent">
<!-- Mode Selector -->
<div class="flex justify-center mb-8">
<div class="flex bg-black/40 backdrop-blur-lg rounded-full p-1 border border-white/10">
<button class="px-4 py-1.5 rounded-full bg-primary text-white text-xs font-bold shadow-lg transition-all">
                    Diagnose
                </button>
<button class="px-4 py-1.5 rounded-full text-white/70 hover:text-white text-xs font-semibold transition-all">
                    Identify
                </button>
</div>
</div>
<!-- Controls Grid -->
<div class="flex items-center justify-between px-10 max-w-md mx-auto w-full">
<!-- Gallery Upload -->
<button class="flex flex-col items-center gap-1 group">
<div class="size-12 rounded-xl bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center text-white transition-all group-active:scale-95 hover:bg-white/20">
<span class="material-symbols-outlined">photo_library</span>
</div>
</button>
<!-- Shutter Button -->
<button class="relative group">
<!-- Outer Ring -->
<div class="size-20 rounded-full border-4 border-white flex items-center justify-center bg-transparent transition-transform group-active:scale-95">
<!-- Inner Circle -->
<div class="size-16 rounded-full bg-primary shadow-[0_0_20px_rgba(164,164,81,0.4)] group-hover:bg-primary/90 transition-colors"></div>
</div>
</button>
<!-- History/Tips -->
<button class="flex flex-col items-center gap-1 group">
<div class="size-12 rounded-xl bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center text-white transition-all group-active:scale-95 hover:bg-white/20">
<span class="material-symbols-outlined">history</span>
</div>
</button>
</div>
</div>
<style>
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</body></html>
