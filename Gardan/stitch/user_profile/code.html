<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Gardener - Profile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#a4a451",
                        "primary-dark": "#8a8a44",
                        "background-light": "#f7f7f6",
                        "background-dark": "#1c1c16",
                        "surface-light": "#ffffff",
                        "surface-dark": "#2c2c24",
                        "text-main": "#171712",
                        "text-muted": "#838363",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "md": "0.375rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Custom Toggle Switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #a4a451;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #a4a451;
        }
        .toggle-checkbox:checked + .toggle-label:before {
            transform: translateX(100%);
        }
        
        /* Material Icon Sizing */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 24px;
        }
        .material-symbols-filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col antialiased text-text-main dark:text-gray-100">
<!-- Top Navigation Bar (Header) -->
<header class="flex items-center justify-between px-6 py-4 bg-background-light dark:bg-background-dark sticky top-0 z-10">
<h1 class="text-xl font-bold tracking-tight text-text-main dark:text-white">Profile</h1>
<button class="p-2 -mr-2 text-text-main dark:text-white hover:bg-black/5 dark:hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto pb-24">
<!-- Profile Header Section -->
<section class="flex flex-col items-center px-6 pt-6 pb-10">
<div class="relative group">
<div class="h-32 w-32 rounded-full ring-4 ring-primary/20 p-1 bg-surface-light dark:bg-surface-dark overflow-hidden mb-5 shadow-lg">
<img alt="Portrait of Karim Bencherif" class="h-full w-full object-cover rounded-full" data-alt="Close up portrait of a smiling man with a beard outdoors" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBtIzumSpcbv8JvAQW3Bx69vRe2h_JeG0E-gJtMaWupAueBxjzH2-HJhqsnIXUMeWSsWeaGJ96p68r_ehMk6bAfbxAZClIK2ta2ojhwd5VSqUJ3zVDVduv3VSZZ38XUDebfYRruuCsV3F1O-rzlZdZgT2adNBTd8aExyYDlZ_IbtxQmoe7yuoPIhQbboz5GzmGIM7Qk8I5LbjJfLxfq0XPwStZ8gBaXsfP621IT9SzldgdcSkmRZohz8QCx4Ea5uYqBbuGW1t2eNgE"/>
</div>
<button aria-label="Change profile picture" class="absolute bottom-4 right-0 bg-primary text-white p-2 rounded-full shadow-md hover:bg-primary-dark transition-colors">
<span class="material-symbols-outlined text-[20px]">photo_camera</span>
</button>
</div>
<h2 class="text-2xl font-bold text-text-main dark:text-white mb-1 text-center">Karim Bencherif</h2>
<p class="text-text-muted dark:text-gray-400 font-medium text-sm text-center">karim.gardener@example.com</p>
<!-- Quick Stats -->
<div class="flex items-center gap-8 mt-6">
<div class="flex flex-col items-center">
<span class="text-xl font-bold text-primary">12</span>
<span class="text-xs text-text-muted dark:text-gray-500 uppercase tracking-wider font-semibold">Plants</span>
</div>
<div class="w-px h-8 bg-gray-200 dark:bg-gray-700"></div>
<div class="flex flex-col items-center">
<span class="text-xl font-bold text-primary">Level 4</span>
<span class="text-xs text-text-muted dark:text-gray-500 uppercase tracking-wider font-semibold">Gardener</span>
</div>
</div>
</section>
<!-- Settings List -->
<section class="px-4 flex flex-col gap-6">
<!-- Account Settings Group -->
<div class="bg-surface-light dark:bg-surface-dark rounded-3xl overflow-hidden shadow-sm border border-gray-100 dark:border-gray-800">
<!-- Edit Profile Item -->
<button class="w-full flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-white/5 transition-colors group border-b border-gray-100 dark:border-gray-800">
<div class="flex items-center gap-4">
<div class="h-10 w-10 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined">edit</span>
</div>
<span class="text-base font-medium text-text-main dark:text-white">Edit Profile</span>
</div>
<span class="material-symbols-outlined text-gray-400">chevron_right</span>
</button>
<!-- Notification Settings Item -->
<button class="w-full flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-white/5 transition-colors group border-b border-gray-100 dark:border-gray-800">
<div class="flex items-center gap-4">
<div class="h-10 w-10 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined">notifications</span>
</div>
<span class="text-base font-medium text-text-main dark:text-white">Notifications</span>
</div>
<span class="material-symbols-outlined text-gray-400">chevron_right</span>
</button>
<!-- Dark Mode Toggle -->
<div class="w-full flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-white/5 transition-colors">
<div class="flex items-center gap-4">
<div class="h-10 w-10 rounded-full bg-primary/10 flex items-center justify-center text-primary dark:text-white dark:bg-white/10">
<span class="material-symbols-outlined">dark_mode</span>
</div>
<span class="text-base font-medium text-text-main dark:text-white">Dark Mode</span>
</div>
<!-- Tailwind Toggle Switch -->
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer peer checked:right-0 checked:border-primary" id="toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer peer-checked:bg-primary transition-colors duration-200" for="toggle"></label>
</div>
</div>
</div>
<!-- Danger Zone / Actions -->
<div class="bg-surface-light dark:bg-surface-dark rounded-3xl overflow-hidden shadow-sm border border-gray-100 dark:border-gray-800">
<button class="w-full flex items-center justify-between p-4 hover:bg-red-50 dark:hover:bg-red-900/10 transition-colors group">
<div class="flex items-center gap-4">
<div class="h-10 w-10 rounded-full bg-red-50 dark:bg-red-900/20 flex items-center justify-center text-red-500 group-hover:bg-red-500 group-hover:text-white transition-colors">
<span class="material-symbols-outlined">logout</span>
</div>
<span class="text-base font-medium text-red-600 dark:text-red-400">Log Out</span>
</div>
</button>
</div>
<div class="text-center mt-4 mb-8">
<p class="text-xs text-text-muted dark:text-gray-600">My Gardener v2.4.0</p>
</div>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 w-full bg-surface-light dark:bg-surface-dark border-t border-gray-200 dark:border-gray-800 pb-safe pt-2 px-6 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-50">
<div class="flex justify-between items-center h-16 max-w-md mx-auto">
<!-- Garden Tab -->
<a class="flex flex-col items-center justify-center w-full gap-1 group text-text-muted dark:text-gray-500 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined group-hover:-translate-y-0.5 transition-transform duration-200">potted_plant</span>
<span class="text-[10px] font-medium tracking-wide">Garden</span>
</a>
<!-- Scan Tab -->
<a class="flex flex-col items-center justify-center w-full gap-1 group text-text-muted dark:text-gray-500 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined group-hover:-translate-y-0.5 transition-transform duration-200">photo_camera</span>
<span class="text-[10px] font-medium tracking-wide">Scan</span>
</a>
<!-- Reminders Tab -->
<a class="flex flex-col items-center justify-center w-full gap-1 group text-text-muted dark:text-gray-500 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined group-hover:-translate-y-0.5 transition-transform duration-200">water_drop</span>
<span class="text-[10px] font-medium tracking-wide">Tasks</span>
</a>
<!-- Profile Tab (Active) -->
<a class="flex flex-col items-center justify-center w-full gap-1 text-primary dark:text-primary" href="#">
<span class="material-symbols-filled material-symbols-outlined">person</span>
<span class="text-[10px] font-bold tracking-wide">Profile</span>
</a>
</div>
</nav>
<!-- Safe area padding fix for bottom nav -->
<style>
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
    </style>
</body></html>
