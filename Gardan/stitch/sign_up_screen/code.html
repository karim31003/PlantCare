<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Gardener - Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#a4a451",
                        "background-light": "#f7f7f6",
                        "background-dark": "#1c1c16",
                        "surface-light": "#ffffff",
                        "surface-dark": "#2a2a22",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Custom gradient for the soft green background */
        .bg-soft-gradient {
            background: linear-gradient(180deg, #f1f1e8 0%, #ffffff 100%);
        }
        .dark .bg-soft-gradient {
            background: linear-gradient(180deg, #1c1c16 0%, #12120e 100%);
        }
        
        /* Material 3-ish input focus state */
        .form-input:focus ~ .input-icon {
            color: #a4a451;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-soft-gradient min-h-screen flex flex-col font-display text-slate-900 dark:text-slate-100 overflow-x-hidden selection:bg-primary/30">
<!-- Header Navigation -->
<div class="flex items-center p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Create Account</h2>
</div>
<!-- Main Content Container -->
<div class="flex-1 flex flex-col items-center w-full max-w-md mx-auto px-6 py-4">
<!-- Branding / Hero -->
<div class="flex flex-col items-center gap-6 mb-8 w-full">
<div class="relative flex items-center justify-center size-24 rounded-2xl bg-primary/20 text-primary shadow-sm">
<span class="material-symbols-outlined text-5xl">potted_plant</span>
</div>
<div class="flex flex-col items-center justify-center space-y-2">
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight tracking-tight text-center">Let's grow together</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-normal text-center">Create an account to track your plants' health.</p>
</div>
</div>
<!-- Form Fields -->
<form class="w-full flex flex-col gap-5">
<!-- Full Name -->
<label class="flex flex-col w-full group">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal pb-2 ml-1">Full Name</span>
<div class="relative flex items-center">
<input class="form-input peer flex w-full rounded-xl border-0 bg-surface-light dark:bg-surface-dark py-4 pl-4 pr-12 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary shadow-sm transition-all" placeholder="Oliver Tree" type="text"/>
<div class="absolute right-4 text-slate-400 peer-focus:text-primary transition-colors pointer-events-none flex items-center">
<span class="material-symbols-outlined">person</span>
</div>
</div>
</label>
<!-- Email -->
<label class="flex flex-col w-full group">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal pb-2 ml-1">Email</span>
<div class="relative flex items-center">
<input class="form-input peer flex w-full rounded-xl border-0 bg-surface-light dark:bg-surface-dark py-4 pl-4 pr-12 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary shadow-sm transition-all" placeholder="green@thumb.com" type="email"/>
<div class="absolute right-4 text-slate-400 peer-focus:text-primary transition-colors pointer-events-none flex items-center">
<span class="material-symbols-outlined">mail</span>
</div>
</div>
</label>
<!-- Password -->
<label class="flex flex-col w-full group">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal pb-2 ml-1">Password</span>
<div class="relative flex items-center">
<input class="form-input peer flex w-full rounded-xl border-0 bg-surface-light dark:bg-surface-dark py-4 pl-4 pr-12 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary shadow-sm transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors flex items-center focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</label>
<!-- Confirm Password -->
<label class="flex flex-col w-full group">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal pb-2 ml-1">Confirm Password</span>
<div class="relative flex items-center">
<input class="form-input peer flex w-full rounded-xl border-0 bg-surface-light dark:bg-surface-dark py-4 pl-4 pr-12 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary shadow-sm transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors flex items-center focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</label>
<!-- Terms Text -->
<p class="text-xs text-slate-500 dark:text-slate-400 text-center px-4 mt-2">
                By signing up, you agree to our 
                <a class="text-primary hover:underline font-medium" href="#">Terms of Service</a> and 
                <a class="text-primary hover:underline font-medium" href="#">Privacy Policy</a>.
            </p>
<!-- Submit Button -->
<button class="mt-2 w-full bg-primary hover:bg-[#8e8e45] text-white font-bold py-4 px-6 rounded-xl shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
                Sign Up
            </button>
</form>
<!-- Social Login Divider -->
<div class="relative w-full py-8 flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
</div>
<div class="relative bg-transparent px-4 text-sm text-slate-500 dark:text-slate-400 bg-[#fbfbf9] dark:bg-background-dark">
                Or continue with
            </div>
</div>
<!-- Social Buttons -->
<div class="flex items-center justify-center gap-4 w-full mb-8">
<button class="flex items-center justify-center size-14 rounded-full bg-surface-light dark:bg-surface-dark border border-slate-200 dark:border-slate-700 shadow-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition-all group">
<!-- Google Icon Mock -->
<svg class="size-6" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
</button>
<button class="flex items-center justify-center size-14 rounded-full bg-surface-light dark:bg-surface-dark border border-slate-200 dark:border-slate-700 shadow-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition-all text-[#1877F2]">
<!-- Facebook Icon Mock -->
<svg class="size-6 fill-current" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path>
</svg>
</button>
<button class="flex items-center justify-center size-14 rounded-full bg-surface-light dark:bg-surface-dark border border-slate-200 dark:border-slate-700 shadow-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition-all text-slate-900 dark:text-white">
<!-- Apple Icon Mock -->
<svg class="size-6 fill-current" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.05 20.28c-.98.95-2.05.88-3.08.47-1.09-.42-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.47C2.7 15.25 3.68 7.79 9.97 7.32c1.52.13 2.53.76 3.32.76.77 0 2.12-.87 3.59-.72 1.25.12 2.19.53 2.8 1.4-2.54 1.55-2.08 5.68.43 6.78-.63 1.58-1.49 3.09-3.06 4.74zm-2.27-14.8c.67-.84 1.13-1.99.98-3.15-.99.04-2.21.68-2.91 1.52-.61.73-1.15 1.93-.99 3.04 1.1.08 2.22-.59 2.92-1.41z"></path>
</svg>
</button>
</div>
<!-- Footer Link -->
<div class="text-center pb-6">
<p class="text-slate-600 dark:text-slate-400">
                Already have an account? 
                <a class="text-primary font-bold hover:underline" href="#">Log In</a>
</p>
</div>
</div>
</body></html>
